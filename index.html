<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rugved Lalit | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --text-primary: #ffffff;
            --btn-border: #ffffff;
            /* Adjust the 0.6 below to 0.1 to make the top clearer, or 0.9 to make it darker */
            --bg-overlay: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,1) 85%);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;

            /* BACKGROUND IMAGE SETTINGS */
            /* Ensure your image is named 'background.png' and is in the same folder */
            background: var(--bg-overlay), url('IMG_4508.JPG.jpeg');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            background-color: #000; /* Fallback if image fails */
        }

        /* 1. Profile Section */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            /* If profile image fails, it shows a dark circle */
            background-color: #111; 
        }

        h1 { font-size: 1.8rem; margin: 0; font-weight: 700; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .subtitle { font-size: 0.9rem; margin-top: 10px; opacity: 0.9; letter-spacing: 0.5px; }

        /* 2. Social Icons */
        .social-icons {
            display: flex;
            gap: 25px;
            margin: 30px 0;
            font-size: 1.6rem;
        }

        .social-icons a {
            color: white;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
        }

        .social-icons a:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }

        /* 3. Tagline */
        .tagline {
            max-width: 320px;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 50px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* 4. The 3D Buttons */
        .container { width: 100%; max-width: 400px; }

        .link-card {
            display: block;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px); /* Makes buttons look premium */
            border: 2px solid var(--btn-border);
            border-radius: 60px;
            padding: 18px;
            margin-bottom: 25px;
            text-decoration: none;
            color: white;
            transition: all 0.1s ease;
            /* Sharp 3D Shadow */
            box-shadow: 6px 6px 0px rgba(255, 255, 255, 0.9);
        }

        /* Click/Hover Animation */
        .link-card:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px white;
        }

        .btn-title { display: block; font-weight: 800; font-size: 1.05rem; text-transform: uppercase; }
        .btn-sub { display: block; font-size: 0.75rem; margin-top: 5px; opacity: 0.8; letter-spacing: 1px; }
    </style>
</head>
<body>

        <a href="https://wa.me/8356032026" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <div class="tagline">
        Building brands. Creating Stories.<br>Designing my own life.
    </div>

    <div class="container">

            <span class="btn-sub">GRAPHICS | POST - PRODUCTION</span>
        </a>

        <a href="https://www.instagram.com/maharajchaiwala.station?igsh=MXR5eHRqdWh1YzU4YQ==" class="link-card">

</body>
