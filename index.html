    <style>
        :root {
            --text-primary: #ffffff;
            --bg-effect: radial-gradient(circle at 50% 100px, #b30000 0%, #4a0000 30%, #000000 100%);
        }

        body {
            background: #000000;
            background-image: var(--bg-effect);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            margin: 0;
        }

        /* Profile Image Fix */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            margin-bottom: 20px;
            background-color: #222; /* Placeholder color if image fails */
        }

        h1 { font-size: 1.8rem; margin: 0; font-weight: 700; }
        .subtitle { font-size: 0.9rem; margin-top: 8px; opacity: 0.8; }

        /* Social Icons Styles */
        .social-icons {
            display: flex;
            gap: 25px;
            margin: 25px 0;
            font-size: 1.5rem;
        }

        .social-icons a {
            color: white;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .social-icons a:hover { opacity: 0.7; }

        .tagline {
            max-width: 300px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        /* Buttons */
        .container { width: 100%; max-width: 400px; }

        .link-card {
            display: block;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            border-radius: 50px;
            padding: 16px;
            margin-bottom: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            box-shadow: 6px 6px 0px white;
            transition: 0.2s;
        }

        .link-card:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px white;
        }

        .btn-title { display: block; font-weight: 800; font-size: 1rem; text-transform: uppercase; }
        .btn-sub { display: block; font-size: 0.7rem; margin-top: 4px; opacity: 0.7; }
    </style>
